<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Office Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

<div class="controls">
  <button id="startBtn">Start</button>
  <button id="stopBtn">Stop</button>
</div>

<div id="leftPlayer" class="player left">
  <div class="hand left-hand">
    <img src="https://img.freepik.com/premium-wektory/czesc-ciala-ludzkiej-dloni-doodle-liniowa-kreskowka-kolorowanka_253359-5396.jpg?w=2000">
  </div>
  <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png">
  Aga
</div>

<div id="rightPlayer" class="player right">
  <div class="hand right-hand">
    <img src="https://img.freepik.com/premium-wektory/czesc-ciala-ludzkiej-dloni-doodle-liniowa-kreskowka-kolorowanka_253359-5396.jpg?w=2000">
  </div>
  <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
  Sylwi
</div>

<div id="paper">Moje cele</div>

<div id="info">W/S, ↑↓ albo dotyk: lewa/prawa strona</div>

<div id="score">
  Ag: <span id="scoreLeft">0</span> |
  Syl: <span id="scoreRight">0</span>
</div>

</div>

<script src="main.js"></script>

</body>
</html>
